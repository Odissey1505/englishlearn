}

function CoursePage({ courseId, goHome, goLesson, canSeeLesson, isLessonCompleted, isTeacher }) {
  const course = COURSES.find(c => c.id === courseId);
  const [openUnits, setOpenUnits] = useState(new Set([course?.units[0]?.id]));
  if (!course) return <div className="page"><p>Курс не знайдено.</p></div>;

  // Готуємо юніти та уроки з урахуванням доступу
  const unitsWithVisibility = course.units.map(unit => {
    const lessonsWithVisibility = unit.lessons.map(lesson => ({
      ...lesson,
      canSee: canSeeLesson ? canSeeLesson(course.id, lesson.id) : true,
      completed: isLessonCompleted ? isLessonCompleted(course.id, lesson.id) : false
    }));
    // Для учня показуємо тільки видимі уроки
    const visibleLessons = isTeacher ? lessonsWithVisibility : lessonsWithVisibility.filter(l => l.canSee);
    return { ...unit, visibleLessons, hasAnyVisible: visibleLessons.length > 0 };
  });

  // Всі юніти видимі для teacher, для учня — тільки ті, де є хоч один доступний урок
  const visibleUnits = isTeacher ? unitsWithVisibility : unitsWithVisibility.filter(u => u.hasAnyVisible);

  const totalLessons = course.units.reduce((sum, u) => sum + u.lessons.length, 0);
  const totalVisibleLessons = visibleUnits.reduce((sum, u) => sum + u.visibleLessons.length, 0);
  const totalCompleted = visibleUnits.reduce((sum, u) => sum + u.visibleLessons.filter(l => l.completed).length, 0);
  const progressPercent = totalVisibleLessons > 0 ? Math.round((totalCompleted / totalVisibleLessons) * 100) : 0;

  const toggleUnit = (id) => setOpenUnits(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; });

  const circumference = 2 * Math.PI * 60;
  const dashOffset = circumference - (circumference * progressPercent / 100);

  return (
    <main className="page">
      <Crumbs items={[{ label: 'Library', onClick: goHome }, { label: course.title, current: true }]} />
      <div className="course-hero">
        <div className="course-hero-text">
          <div className="course-hero-eyebrow">Course</div>
          <h1 className="course-hero-title">{course.title}</h1>
          <p className="course-hero-sub">{course.description}</p>
          <div className="course-hero-meta">
            <div><strong>{isTeacher ? course.units.length : visibleUnits.length}</strong><span>Unit{visibleUnits.length !== 1 ? 's' : ''}</span></div>
            <div><strong>{isTeacher ? totalLessons : totalVisibleLessons}</strong><span>Lesson{totalVisibleLessons !== 1 ? 's' : ''}</span></div>
            <div><strong>{course.level}</strong><span>Level</span></div>
            <div><strong>{course.age}</strong><span>Age</span></div>
          </div>
        </div>
        <div className="course-progress">
          <div className="progress-ring">
            <svg width="140" height="140">
              <circle className="progress-ring-bg" cx="70" cy="70" r="60" fill="none" strokeWidth="8" />
              <circle className="progress-ring-fg" cx="70" cy="70" r="60" fill="none" strokeWidth="8" strokeLinecap="round" strokeDasharray={circumference} strokeDashoffset={dashOffset} />
            </svg>
            <div className="progress-ring-text">{progressPercent}%<small>completed</small></div>
          </div>
        </div>
      </div>

      {visibleUnits.length === 0 && (
        <div className="empty-inline">
          <div className="empty-inline-title">Ще немає доступних уроків</div>
          <div>Твій вчитель відкриє їх незабаром 🌱</div>
        </div>
      )}

      {visibleUnits.map(unit => {
        const isOpen = openUnits.has(unit.id);
        const lessonsForRender = isTeacher ? unit.lessons.map(l => ({ ...l, canSee: canSeeLesson ? canSeeLesson(course.id, l.id) : true, completed: isLessonCompleted ? isLessonCompleted(course.id, l.id) : false })) : unit.visibleLessons;
        const unitCompleted = lessonsForRender.filter(l => l.completed).length;
        const unitTotal = lessonsForRender.length;
        return (
          <div key={unit.id} className={`unit ${isOpen ? 'open' : ''}`}>
            <button className="unit-head" onClick={() => toggleUnit(unit.id)}>
              <div className="unit-head-left">
                <div className="unit-num">{unit.number}</div>
                <div className="unit-title-block">
                  <div className="unit-eyebrow">Unit {unit.number}</div>
                  <h3 className="unit-title">{unit.title}</h3>
                  <div className="unit-meta-line">{unit.subtitle} · {unitTotal} lesson{unitTotal !== 1 ? 's' : ''}</div>
                </div>
              </div>
              <div className="unit-head-right">
                <div className="unit-progress">
                  <div className="unit-progress-bar"><div className="unit-progress-bar-fg" style={{ width: unitTotal > 0 ? (unitCompleted/unitTotal*100) + '%' : '0%' }} /></div>
                  <span>{unitCompleted}/{unitTotal}</span>
                </div>
                <ChevronRight size={18} className="unit-chevron" />
              </div>
            </button>
            <div className="unit-body">
              <ul className="unit-list">
                {lessonsForRender.map(lesson => {
                  const locked = !lesson.canSee;
                  return (
                    <li
                      key={lesson.id}
                      className={`unit-row ${lesson.completed ? 'row-completed' : ''} ${locked ? 'row-locked' : ''}`}
                      onClick={() => { if (!locked || isTeacher) goLesson(course.id, lesson.id); }}
                      style={{ cursor: (!locked || isTeacher) ? 'pointer' : 'not-allowed', opacity: locked && !isTeacher ? 0.5 : 1 }}
                    >
                      <div className="unit-row-num">
                        {lesson.completed
                          ? <span className="unit-row-check"><Check size={14} /></span>
                          : locked
                            ? <span className="unit-row-lock"><Lock size={12} /></span>
                            : lesson.number}
                      </div>
                      <div className="unit-row-body">
                        <div className="unit-row-title">Lesson {lesson.number} · {lesson.title}</div>
                        <div className="unit-row-meta">{lesson.titleUk} · {lesson.type}</div>
                      </div>
                      <div className="unit-row-tags">
                        {lesson.completed && <span className="badge badge-completed">Завершено</span>}
                        {!lesson.completed && !locked && <span className="badge badge-open">Відкрито</span>}
                        {locked && isTeacher && <span className="badge badge-locked">Закрито для учнів</span>}
                        <span className="badge type">{lesson.type}</span>
                      </div>
                    </li>
                  );
                })}
              </ul>
            </div>
          </div>
        );
      })}
    </main>
  );
}

function Crumbs({ items }) {
  return (
    <nav className="crumbs">
      {items.map((it, i) => (
        <React.Fragment key={i}>
          {i > 0 && <span style={{ color: 'var(--ink-3)', opacity: 0.6 }}>/</span>}
          {it.current ? <span className="current">{it.label}</span> : <button onClick={it.onClick}>{it.label}</button>}
        </React.Fragment>
      ))}
    </nav>
  );
}

function TenseDetail({ tense, onClose, showClose = true }) {
  return (
    <div className={`tense-detail accent-${tense.group}`} style={{ '--accent-color': tense.group === 'present' ? '#a8bb96' : tense.group === 'past' ? '#d68870' : '#95b6c9' }}>
      {showClose && (
        <button className="tense-detail-close" onClick={onClose} aria-label="Закрити">
          <X size={16} />
        </button>
      )}
      <div className="tense-detail-header">
        <div>
          <h3 className="tense-detail-title">{tense.name}</h3>
          <div className="tense-detail-title-uk">{tense.nameUk}</div>
        </div>
        <div className="tense-detail-formula">{tense.formulaLong}</div>
      </div>

      <div className="tense-universal">
        <div className="tense-universal-label">✦ Універсальне речення</div>
        <div className="tense-universal-text">"{tense.universal}"</div>
      </div>

      {tense.uses && tense.uses.length > 0 && (
        <div className="tense-uses-section">
          <div className="tense-uses-label">Коли вживається — всі варіанти</div>
          <div className="tense-uses-list">
            {tense.uses.map((use, i) => (
              <div key={i} className="tense-use">
                <div className="tense-use-head">
                  <div className="tense-use-num">{i + 1}</div>
                  <div className="tense-use-case">{use.case}</div>
                </div>
                <p className="tense-use-explain">{use.explain}</p>
                <div className="tense-use-examples">
                  {use.examples.map((ex, j) => (
                    <div key={j} className="tense-use-example">
                      <span className="tense-use-example-mark">→</span>
                      <span>{ex}</span>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      <div className="tense-detail-body">
        <div>
          <div className="tense-detail-block-label">Маркери часу (signal words)</div>
          <div className="tense-detail-markers">{tense.markers}</div>
        </div>
        <div>
          <div className="tense-detail-block-label">Формула</div>
          <div className="tense-detail-when" style={{ fontFamily: 'ui-monospace, SF Mono, Menlo, monospace', fontSize: 13.5 }}>{tense.formulaLong}</div>
        </div>
      </div>

      <div>
        <div className="tense-detail-examples-label">Як побудувати: ствердження / заперечення / питання</div>
        <div className="tense-detail-examples">
          <div className="tense-detail-example positive"><span className="tense-detail-example-sign">+</span><span className="tense-detail-example-text">{tense.positive}</span></div>
          <div className="tense-detail-example negative"><span className="tense-detail-example-sign">−</span><span className="tense-detail-example-text">{tense.negative}</span></div>
          <div className="tense-detail-example question"><span className="tense-detail-example-sign">?</span><span className="tense-detail-example-text">{tense.question}</span></div>
        </div>
      </div>
    </div>
  );
}

function TensesMatrix() {
  const [activeId, setActiveId] = useState('present-simple');
  const [compareAll, setCompareAll] = useState(false);
  const activeTense = TENSES.find(t => t.id === activeId);

  const cellFor = (group, col) => TENSES.find(t => t.group === group && t.col === col);

  return (
    <section className="tenses-section">
      <h2 className="tenses-section-title"><Layers size={22} /> Часи (Tenses)</h2>
      <p className="tenses-section-sub">Дванадцять часів англійської мови в одній зручній таблиці. Натисни на будь-який час, щоб переглянути коли він вживається, маркери, формулу та приклади.</p>

      <div className="tenses-intro">
        <Sparkles size={16} />
        <p>Нижче представлена <strong>велика інтерактивна матриця часів</strong>. Обирай будь-який час, щоб відкрити його детальну схему. Зверни увагу на <strong>універсальне речення</strong> — те ж саме речення про піцу 🍕 змінюється, коли переходиш між часами, і ти бачиш точно як трансформується форма дієслова.</p>
      </div>

      {/* Matrix */}
      <div className="tense-matrix">
        <div className="tense-matrix-header">Часова група</div>
        {TENSE_COLUMNS.map(c => <div key={c.key} className="tense-matrix-header">{c.label}</div>)}

        {TENSE_ROWS.map(r => (
          <React.Fragment key={r.key}>
            <div className={`tense-matrix-rowlabel row-${r.key}`}>{r.label}</div>
            {TENSE_COLUMNS.map(c => {
              const t = cellFor(r.key, c.key);
              if (!t) return <div key={c.key} />;
              const isActive = t.id === activeId && !compareAll;
              return (
                <button
                  key={c.key}
                  className={`tense-cell row-${r.key} ${isActive ? 'active' : ''}`}
                  onClick={() => { setCompareAll(false); setActiveId(t.id); window.scrollTo({ top: document.getElementById('tense-detail-anchor')?.offsetTop - 90 || 0, behavior: 'smooth' }); }}
                >
                  <div className="tense-cell-name">{t.name}</div>
                  <div className="tense-cell-formula">{t.formula}</div>
                </button>
              );
            })}
          </React.Fragment>
        ))}
      </div>

      <div id="tense-detail-anchor" />

      {/* Single detail (default) */}
      {!compareAll && activeTense && (
        <TenseDetail tense={activeTense} onClose={() => setActiveId(null)} />
      )}

      {!compareAll && !activeTense && (
        <div className="empty" style={{ marginBottom: 22 }}>
          <p>Обери будь-який час у матриці зверху, щоб переглянути деталі.</p>
        </div>
      )}

      {/* Compare all toggle */}
      <div className="compare-all-row">
        <div className="compare-all-hint">{compareAll ? 'Усі 12 часів показано один за одним для порівняння.' : 'Хочеш побачити всі часи відразу для порівняння?'}</div>
        <button className="compare-all-btn" onClick={() => setCompareAll(!compareAll)}>
          {compareAll ? <React.Fragment><ChevronUp size={16} /> Згорнути</React.Fragment> : <React.Fragment><Layers size={16} /> Оглянути всі часи</React.Fragment>}
        </button>
      </div>

      {/* Compare all grid */}
      {compareAll && (
        <div className="compare-all-grid">
          {TENSE_ROWS.map(r => (
            <React.Fragment key={r.key}>
              <div className={`compare-group-label row-${r.key}`}>{r.label}</div>
              {TENSES.filter(t => t.group === r.key).map(t => (
                <TenseDetail key={t.id} tense={t} showClose={false} />
              ))}
            </React.Fragment>
          ))}
        </div>
      )}
    </section>
  );
}

      </header>
      <TensesMatrix />
    </main>
  );

  const [newCount, setNewCount] = useState(0);

  // Рахуємо, скільки карток чекають на повторення (тільки для учня)
  useEffect(() => {
    if (isTeacher || !session) return;
    async function loadDue() {
      const { data } = await window.SB
        .from('vocab_progress')
        .select('word_id, next_review_at')
        .eq('student_id', session.user.id);
      const now = new Date();
      const seenIds = new Set((data || []).map(r => r.word_id));
      const dueIds = new Set(
        (data || [])
          .filter(r => new Date(r.next_review_at) <= now)
          .map(r => r.word_id)
      );
      const visible = allItems.filter(w => canSeeVocabWord(w));
      const due = visible.filter(w => dueIds.has(w.wordId)).length;
      const neu = visible.filter(w => !seenIds.has(w.wordId)).length;
      setDueCount(due);
      setNewCount(neu);
    }
    loadDue();
  }, [session, isTeacher]);

  // Групуємо доступні слова за курсами
  const availableByCourse = useMemo(() => {
    const map = new Map();
    allItems.forEach(item => {
      if (!canSeeVocabWord(item)) return;
      if (!map.has(item.courseId)) {
        const course = COURSES.find(c => c.id === item.courseId);
        map.set(item.courseId, {
          courseId: item.courseId,
          courseTitle: course ? course.title : item.courseTitle,
          courseSubtitle: course ? course.subtitle : null,
          courseAccent: course ? course.accent : 'sage',
          count: 0
        });
      }
      map.get(item.courseId).count++;
    });
    return Array.from(map.values());
  }, [allItems, canSeeVocabWord, isTeacher]);

  return (
    <main className="page">
      <Crumbs items={[{ label: 'Library', onClick: goHome }, { label: 'Vocabulary Bank', current: true }]} />
      <header className="page-header">
        <div className="page-eyebrow"><span className="dot" /> Vocabulary Bank</div>
        <h1 className="page-title">Твої вивчені слова <em>під рукою.</em></h1>
        <p style={{ fontSize: 16, color: 'var(--ink-2)', lineHeight: 1.6, marginTop: 14, maxWidth: 640 }}>
          {isTeacher
            ? 'Уся лексика з усіх курсів. Обери курс, щоб побачити всі слова з нього.'
            : 'Тут з’являються слова з уроків, які ти вже завершив. Обери курс, щоб переглянути вивчену лексику.'}
        </p>
      </header>

      {!isTeacher && (dueCount > 0 || newCount > 0) && (
        <button
          className="fc-review-banner"
          onClick={() => setRoute({ page: 'flashcards', mode: 'due' })}
        >
          <div className="fc-review-banner-icon">🎴</div>
          <div className="fc-review-banner-body">
            <div className="fc-review-banner-title">
              {dueCount > 0 && newCount > 0 && `${dueCount} на повторення + ${newCount} нових`}
              {dueCount > 0 && newCount === 0 && `${dueCount} карток чекають на повторення`}
              {dueCount === 0 && newCount > 0 && `${newCount} нових слів для вивчення`}
            </div>
            <div className="fc-review-banner-sub">Клікни, щоб почати тренування (макс 20 за раз)</div>
          </div>
          <ChevronRight size={20} />
        </button>
      )}

      {availableByCourse.length === 0 ? (
        <div className="empty-inline">
          <div className="empty-inline-title">Поки що порожньо</div>
          <div>
            {isTeacher
              ? 'Немає курсів зі словами. Додай хоча б один курс з vocabPresentation.'
              : 'Слова з’являться, коли ти завершиш перший урок. Твій вчитель позначить його як завершений.'}
          </div>
        </div>
      ) : (
        <div className="vocab-course-grid">
          {availableByCourse.map(c => (
            <button
              key={c.courseId}
              className={`vocab-course-card accent-${c.courseAccent}`}
              onClick={() => setRoute({ page: 'vocab-course', courseId: c.courseId })}
            >
              <div className="vocab-course-icon"><Library size={22} /></div>
              <div className="vocab-course-body">
                <h3 className="vocab-course-title">{c.courseTitle}</h3>
                {c.courseSubtitle && <div className="vocab-course-sub">{c.courseSubtitle}</div>}
                <div className="vocab-course-count">
                  <strong>{c.count}</strong> вивчен{c.count === 1 ? 'е слово' : c.count < 5 ? 'і слова' : 'их слів'}
                </div>
              </div>
              <ChevronRight size={18} className="vocab-course-chevron" />
            </button>
          ))}
        </div>
      )}
    </main>
  );
}

// Сторінка курсу у Vocab Bank — юніти та уроки
function VocabCoursePage({ courseId, goHome, setRoute, canSeeVocabWord, isTeacher }) {
  const course = COURSES.find(c => c.id === courseId);
  const allItems = useMemo(() => getAllVocabItems(), []);
  if (!course) return <main className="page"><p>Курс не знайдено.</p></main>;

  // Групуємо доступні слова за юнітами та уроками
  const structure = useMemo(() => {
    const unitsMap = new Map();
    allItems
      .filter(item => item.courseId === courseId && canSeeVocabWord(item))
      .forEach(item => {
        if (!unitsMap.has(item.unitId)) {
          unitsMap.set(item.unitId, {
            unitId: item.unitId,
            unitNumber: item.unitNumber,
            unitTitle: item.unitTitle,
            lessons: new Map()
          });
        }
        const unit = unitsMap.get(item.unitId);
        if (!unit.lessons.has(item.lessonId)) {
          unit.lessons.set(item.lessonId, {
            lessonId: item.lessonId,
            lessonNumber: item.lessonNumber,
            lessonTitle: item.lessonTitle,
            lessonTitleUk: item.lessonTitleUk,
            count: 0
          });
        }
        unit.lessons.get(item.lessonId).count++;
      });
    // Перетворюємо в масиви для рендеру, сортуємо за номером
    return Array.from(unitsMap.values())
      .sort((a, b) => a.unitNumber - b.unitNumber)
      .map(u => ({
        ...u,
        lessons: Array.from(u.lessons.values()).sort((a, b) => a.lessonNumber - b.lessonNumber)
      }));
  }, [allItems, courseId, canSeeVocabWord, isTeacher]);

  const totalWords = structure.reduce((sum, u) => sum + u.lessons.reduce((s, l) => s + l.count, 0), 0);

  return (
    <main className="page">
      <Crumbs items={[
        { label: 'Library', onClick: goHome },
        { label: 'Vocabulary Bank', onClick: () => setRoute({ page: 'vocabulary' }) },
        { label: course.title, current: true }
      ]} />
      <header className="page-header">
        <div className="page-eyebrow"><span className="dot" /> {course.title}</div>
        <h1 className="page-title">Словник курсу</h1>
        <p style={{ fontSize: 15, color: 'var(--ink-2)', lineHeight: 1.6, marginTop: 14 }}>
          {totalWords} {totalWords === 1 ? 'слово доступне' : totalWords < 5 ? 'слова доступних' : 'слів доступних'} у {structure.length} {structure.length === 1 ? 'юніті' : 'юнітах'}. Обери урок, щоб переглянути його лексику.
        </p>
      </header>

      {structure.length === 0 ? (
        <div className="empty-inline">
          <div className="empty-inline-title">Ще немає слів</div>
          <div>Заверши перший урок цього курсу, щоб слова з’явилися тут.</div>
        </div>
      ) : (
        structure.map(unit => (
          <div key={unit.unitId} className="vocab-unit-block">
            <div className="vocab-unit-head">
              <div className="vocab-unit-num">{unit.unitNumber}</div>
              <div>
                <div className="vocab-unit-eyebrow">Unit {unit.unitNumber}</div>
                <h3 className="vocab-unit-title">{unit.unitTitle}</h3>
              </div>
            </div>
            <ul className="vocab-lesson-list">
              {unit.lessons.map(lesson => (
                <li
                  key={lesson.lessonId}
                  className="vocab-lesson-row"
                  onClick={() => setRoute({ page: 'vocab-lesson', courseId, lessonId: lesson.lessonId })}
                >
                  <div className="vocab-lesson-num">L{lesson.lessonNumber}</div>
                  <div className="vocab-lesson-body">
                    <div className="vocab-lesson-title">{lesson.lessonTitle}</div>
                    <div className="vocab-lesson-titleuk">{lesson.lessonTitleUk}</div>
                  </div>
                  <div className="vocab-lesson-count">
                    <strong>{lesson.count}</strong> {lesson.count === 1 ? 'слово' : lesson.count < 5 ? 'слова' : 'слів'}
                  </div>
                  <ChevronRight size={16} className="vocab-lesson-chevron" />
                </li>
              ))}
            </ul>
          </div>
        ))
      )}
    </main>
  );
}

// Сторінка уроку у Vocab Bank — самі слова
function VocabLessonPage({ courseId, lessonId, goHome, setRoute, canSeeVocabWord, isTeacher }) {
  const course = COURSES.find(c => c.id === courseId);
  const allItems = useMemo(() => getAllVocabItems(), []);
  const [query, setQuery] = useState('');

  if (!course) return <main className="page"><p>Курс не знайдено.</p></main>;

  const found = findLesson(courseId, lessonId);
  if (!found) return <main className="page"><p>Урок не знайдено.</p></main>;
  const { unit, lesson } = found;

  const words = allItems.filter(item => item.courseId === courseId && item.lessonId === lessonId && canSeeVocabWord(item));

  const q = query.toLowerCase().trim();
  const filtered = q
    ? words.filter(w => (w.en || '').toLowerCase().includes(q) || (w.uk || '').toLowerCase().includes(q))
    : words;

  return (
    <main className="page">
      <Crumbs items={[
        { label: 'Library', onClick: goHome },
        { label: 'Vocabulary Bank', onClick: () => setRoute({ page: 'vocabulary' }) },
        { label: course.title, onClick: () => setRoute({ page: 'vocab-course', courseId }) },
        { label: `Lesson ${lesson.number}`, current: true }
      ]} />
      <header className="page-header">
        <div className="page-eyebrow"><span className="dot" /> Unit {unit.number} · Lesson {lesson.number}</div>
        <h1 className="page-title">{lesson.title}</h1>
        <p style={{ fontSize: 15, color: 'var(--ink-2)', lineHeight: 1.6, marginTop: 14 }}>
          {words.length} {words.length === 1 ? 'слово' : words.length < 5 ? 'слова' : 'слів'} у цьому уроці. Відкрий український переклад натисканням на «Українською», щоб перевірити себе.
        </p>
      </header>

      {words.length > 0 && !isTeacher && (
        <div style={{ marginBottom: 24 }}>
          <button
            className="fc-cta-btn"
            onClick={() => setRoute({ page: 'flashcards', mode: 'lesson', courseId, lessonId })}
          >
            🎴 Тренуватися флешкартками ({words.length})
          </button>
        </div>
      )}

      {words.length > 5 && (
        <div style={{ marginBottom: 24 }}>
          <input
            type="text"
            className="students-search"
            style={{ width: '100%' }}
            placeholder="Пошук по словах (en або uk)..."
            value={query}
            onChange={e => setQuery(e.target.value)}
          />
        </div>
      )}

      {filtered.length === 0 ? (
        <div className="empty-inline">
          <div className="empty-inline-title">Нічого не знайдено</div>
          <div>Спробуй інше слово в пошуку</div>
        </div>
      ) : (
        <div className="vocab-presentation">
          {filtered.map(word => (
            <div key={word.wordId} className="vocab-pres-card" style={{ '--accent': ACCENT_MAP[word.accent] || ACCENT_MAP.sage }}>
              <div className="vocab-pres-emoji">{word.emoji}</div>
              <div className="vocab-pres-word">{word.en}</div>
              <div className="vocab-pres-explain">{word.explain}</div>
              <Spoiler label="Переклад"><strong>{word.uk}</strong></Spoiler>
            </div>
          ))}
        </div>
      )}
    </main>
  );
}

  return (
