// ── Vocab Access Section (частина StudentPage) ──
function VocabAccessSection({ student, allVocabItems, completions, vocabAccess, toggleVocabWord }) {
  const [expandedCourse, setExpandedCourse] = useState(null);
  const [expandedLesson, setExpandedLesson] = useState(null);

  // Групуємо всі слова за курсом → уроком
  const structure = useMemo(() => {
    const map = new Map();
    allVocabItems.forEach(item => {
      if (!map.has(item.courseId)) {
        const course = COURSES.find(c => c.id === item.courseId);
        map.set(item.courseId, {
          courseId: item.courseId,
          courseTitle: course ? course.title : item.courseTitle,
          lessons: new Map()
        });
      }
      const courseEntry = map.get(item.courseId);
      if (!courseEntry.lessons.has(item.lessonId)) {
        courseEntry.lessons.set(item.lessonId, {
          lessonId: item.lessonId,
          lessonNumber: item.lessonNumber,
          lessonTitle: item.lessonTitle,
          courseId: item.courseId,
          words: []
        });
      }
      courseEntry.lessons.get(item.lessonId).words.push(item);
    });
    return Array.from(map.values()).map(c => ({
      ...c,
      lessons: Array.from(c.lessons.values()).sort((a, b) => a.lessonNumber - b.lessonNumber)
    }));
  }, [allVocabItems]);

  return (
    <section className="access-section">
      <h2 className="access-section-title">Слова у Vocabulary Bank</h2>
      <p className="access-section-sub">
        Автоматично: учень бачить слова з <strong>завершених</strong> уроків. Тут ти можеш <strong>вручну</strong> відкрити доступ до окремих слів з ще не завершених уроків (наприклад, для попереднього ознайомлення).
      </p>

      {structure.map(course => {
        const isCourseOpen = expandedCourse === course.courseId;
        const totalWords = course.lessons.reduce((s, l) => s + l.words.length, 0);
        const manualCount = course.lessons.reduce((s, l) => s + l.words.filter(w => vocabAccess.has(w.wordId)).length, 0);
        return (
          <div key={course.courseId} className="access-course-block">
            <div className="access-course-head" style={{ cursor: 'pointer' }} onClick={() => setExpandedCourse(isCourseOpen ? null : course.courseId)}>
              <div className="access-course-name">{course.courseTitle}</div>
              <div className="access-course-meta">
                {totalWords} слів{manualCount > 0 ? ` · +${manualCount} відкрито вручну` : ''}
              </div>
              <ChevronRight size={16} style={{ color: 'var(--ink-3)', transform: isCourseOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.2s' }} />
            </div>
            {isCourseOpen && (
              <div className="access-lessons">
                {course.lessons.map(lesson => {
                  const isLessonCompleted = completions.has(`${lesson.courseId}:${lesson.lessonId}`);
                  const isLessonOpen = expandedLesson === `${lesson.courseId}:${lesson.lessonId}`;
                  const wordsWithAccess = lesson.words.filter(w => vocabAccess.has(w.wordId)).length;
                  return (
                    <div key={lesson.lessonId} style={{ padding: '8px 0', borderBottom: '1px dashed color-mix(in srgb, var(--line) 60%, transparent)' }}>
                      <div
                        style={{ display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer', padding: '6px 0' }}
                        onClick={() => setExpandedLesson(isLessonOpen ? null : `${lesson.courseId}:${lesson.lessonId}`)}
                      >
                        <div className="access-lesson-num">L{lesson.lessonNumber}</div>
                        <div style={{ flex: 1, fontSize: 13.5, color: 'var(--ink)' }}>
                          {lesson.lessonTitle}
                          {isLessonCompleted && <span style={{ marginLeft: 8, fontSize: 11, color: 'var(--sage-deep)', fontWeight: 600 }}>✓ Завершено (всі слова відкриті)</span>}
                        </div>
                        <div style={{ fontSize: 12, color: 'var(--ink-3)' }}>
                          {lesson.words.length} слів{wordsWithAccess > 0 ? ` · ${wordsWithAccess} вручну` : ''}
                        </div>
                        <ChevronRight size={14} style={{ color: 'var(--ink-3)', transform: isLessonOpen ? 'rotate(90deg)' : 'none', transition: 'transform 0.2s' }} />
                      </div>
                      {isLessonOpen && (
                        <div style={{ paddingLeft: 44, paddingTop: 8, paddingBottom: 4, display: 'flex', flexDirection: 'column', gap: 4 }}>
                          {lesson.words.map(word => {
                            const isGrantedManually = vocabAccess.has(word.wordId);
                            const isAutoOpen = isLessonCompleted;
                            return (
                              <div key={word.wordId} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '4px 0', fontSize: 13 }}>
                                <span style={{ fontSize: 15, width: 20, textAlign: 'center' }}>{word.emoji}</span>
                                <div style={{ flex: 1 }}>
                                  <span style={{ fontWeight: 500, color: 'var(--ink)' }}>{word.en}</span>
                                  <span style={{ color: 'var(--ink-3)', marginLeft: 8, fontSize: 12 }}>— {word.uk}</span>
                                </div>
                                {isAutoOpen ? (
                                  <span style={{ fontSize: 11, color: 'var(--sage-deep)', fontStyle: 'italic' }}>авто (завершено)</span>
                                ) : (
                                  <button
                                    className={`access-lesson-btn ${isGrantedManually ? 'granted' : 'locked'}`}
                                    onClick={() => toggleVocabWord(word)}
                                  >
                                    {isGrantedManually
                                      ? <React.Fragment><Unlock size={11} /> Відкрито</React.Fragment>
                                      : <React.Fragment><Lock size={11} /> Закрито</React.Fragment>}
                                  </button>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </section>
  );
}

// Модалка створення учня
function CreateStudentModal({ session, onClose, onCreated }) {
  const [displayName, setDisplayName] = useState('');
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [teacherPassword, setTeacherPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const needsTeacherPassword = !window.__inkwell_teacher_pw;

  async function handleCreate() {
    setError('');
    if (!displayName.trim() || !username.trim() || !password) {
      setError('Заповни всі поля');
      return;
    }
    if (password.length < 6) {
      setError('Пароль має бути не менше 6 символів');
      return;
    }
    if (needsTeacherPassword && !teacherPassword) {
      setError('Введи свій пароль вчителя для підтвердження');
      return;
    }
    // Зберігаємо пароль вчителя в пам'яті сесії (не в localStorage!)
    const teacherPw = needsTeacherPassword ? teacherPassword : window.__inkwell_teacher_pw;

    setLoading(true);
    try {
      const cleanUsername = username.trim().toLowerCase();
      const studentEmail = cleanUsername + '@inkwell.local';

      // 1. Створюємо учня через signUp (цей виклик автоматично залогінить учня)
      const { data: signUpData, error: signUpError } = await window.SB.auth.signUp({
        email: studentEmail,
        password: password,
      });
      if (signUpError) {
        if (signUpError.message.toLowerCase().includes('already') || signUpError.message.toLowerCase().includes('registered')) {
          setError('Учень з таким іменем вже існує');
        } else {
          setError('Помилка створення: ' + signUpError.message);
        }
        setLoading(false);
        return;
      }
      const studentUserId = signUpData.user.id;

      // 2. Одразу перелогінюємось назад як teacher
      const teacherEmail = session.profile.username + '@inkwell.local';
      const { error: reloginError } = await window.SB.auth.signInWithPassword({
        email: teacherEmail,
        password: teacherPw,
      });
      if (reloginError) {
        setError('Не вдалося повернутись до акаунта вчителя. Перевір свій пароль. ' + reloginError.message);
        setLoading(false);
        return;
      }

      // 3. Створюємо профіль учня (тепер від імені teacher)
      const { error: profileError } = await window.SB.from('profiles').insert({
        id: studentUserId,
        username: cleanUsername,
        display_name: displayName.trim(),
        role: 'student'
      });
      if (profileError) {
        setError('Учня створено в auth, але не вдалося створити профіль: ' + profileError.message);
        setLoading(false);
        return;
      }

      // Успіх! Запам'ятовуємо пароль вчителя на час сесії
      window.__inkwell_teacher_pw = teacherPw;
      onCreated({
        id: studentUserId,
        username: cleanUsername,
        display_name: displayName.trim(),
        role: 'student',
        created_at: new Date().toISOString()
      });
    } catch (err) {
      setError('Помилка: ' + err.message);
      setLoading(false);
    }
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose} aria-label="Закрити"><X size={18} /></button>
        <h2 className="modal-title">Новий учень</h2>
        <p className="modal-sub">Створи акаунт для учня. Він зможе увійти зі своїм ім'ям і паролем, які ти тут вкажеш.</p>
        {error && <div className="modal-error">{error}</div>}
        <div className="modal-field">
          <label className="modal-label">Ім'я учня (для показу)</label>
          <input className="modal-input" type="text" value={displayName} onChange={e => setDisplayName(e.target.value)} placeholder="наприклад, Софія" disabled={loading} autoFocus />
        </div>
        <div className="modal-field">
          <label className="modal-label">Ім'я користувача (для входу)</label>
          <input className="modal-input" type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder="наприклад, sofia" disabled={loading} />
        </div>
        <div className="modal-field">
          <label className="modal-label">Пароль учня</label>
          <input className="modal-input" type="text" value={password} onChange={e => setPassword(e.target.value)} placeholder="мінімум 6 символів" disabled={loading} />
        </div>
        {needsTeacherPassword && (
          <div className="modal-field" style={{ marginTop: 20, paddingTop: 16, borderTop: '1px dashed var(--line)' }}>
            <label className="modal-label">Твій пароль (для підтвердження)</label>
            <input className="modal-input" type="password" value={teacherPassword} onChange={e => setTeacherPassword(e.target.value)} placeholder="пароль вчителя" disabled={loading} />
            <div style={{ fontSize: 12, color: 'var(--ink-3)', marginTop: 6, fontStyle: 'italic' }}>Потрібно лише при першому створенні учня — після цього не запитаю до перезавантаження сторінки.</div>
          </div>
        )}
        <div className="modal-actions">
          <button className="modal-btn ghost" onClick={onClose} disabled={loading}>Скасувати</button>
          <button className="modal-btn primary" onClick={handleCreate} disabled={loading}>
            {loading ? 'Створюю...' : 'Створити'}
          </button>
        </div>
      </div>
    </div>
  );
}

      </div>

      {error && <div className="modal-error" style={{ marginBottom: 20 }}>{error}</div>}

      {loading && <div className="empty-inline">Завантажую список...</div>}

      {!loading && filtered.length === 0 && search && (
        <div className="empty-inline">
          <div className="empty-inline-title">Нічого не знайдено</div>
          <div>Спробуй інший запит</div>
        </div>
      )}

      {!loading && filtered.length === 0 && !search && (
        <div className="empty-inline">
          <div className="empty-inline-title">Ще жодного учня</div>
          <div>Натисни "Додати учня", щоб створити перший акаунт</div>
        </div>
      )}

      {!loading && filtered.length > 0 && (
        <div className="students-grid">
          {filtered.map(s => (
            <button key={s.id} className="student-card" onClick={() => setRoute({ page: 'student', studentId: s.id })}>
              <div className="student-card-head">
                <div className="student-avatar">{initialsFor(s.display_name || s.username)}</div>
                <div>
                  <div className="student-name">{s.display_name || s.username}</div>
                  <div className="student-username">@{s.username}</div>
                </div>
              </div>
              <div className="student-meta">
                <span className="student-meta-item">
                  Створено: {new Date(s.created_at).toLocaleDateString('uk-UA')}
                </span>
              </div>
            </button>
          ))}
        </div>
      )}

      {showCreate && (
        <CreateStudentModal
          session={session}
          onClose={() => setShowCreate(false)}
          onCreated={(newStudent) => {
            setStudents(prev => [newStudent, ...prev]);
            setShowCreate(false);
          }}
        />
      )}
    </main>
  );
}

// ── Individual student page ──
function StudentPage({ studentId, session, goHome, setRoute }) {
  const [student, setStudent] = useState(null);
  const [courseAccess, setCourseAccess] = useState(new Set()); // set of course_id
  const [lessonAccess, setLessonAccess] = useState(new Set()); // set of `${course_id}:${lesson_id}`
  const [completions, setCompletions] = useState(new Set()); // set of `${course_id}:${lesson_id}`
  const [vocabAccess, setVocabAccess] = useState(new Set()); // set of word_id
  const [vocabModalWord, setVocabModalWord] = useState(null); // для показу керування словом
  const allVocabItems = useMemo(() => getAllVocabItems(), []);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [showDelete, setShowDelete] = useState(false);
  const [deleting, setDeleting] = useState(false);

  async function loadAll() {
    setLoading(true);
    // Профіль
    const { data: profile, error: profileError } = await window.SB
      .from('profiles')
      .select('*')
      .eq('id', studentId)
      .single();
    if (profileError || !profile) {
      setError('Не вдалося завантажити учня');
      setLoading(false);
      return;
    }
    setStudent(profile);

    // course_access
    const { data: ca } = await window.SB
      .from('course_access')
      .select('course_id')
      .eq('student_id', studentId);
    setCourseAccess(new Set((ca || []).map(r => r.course_id)));

    // lesson_access
    const { data: la } = await window.SB
      .from('lesson_access')
      .select('course_id, lesson_id')
      .eq('student_id', studentId);
    setLessonAccess(new Set((la || []).map(r => `${r.course_id}:${r.lesson_id}`)));

    // lesson_completions
    const { data: lc } = await window.SB
      .from('lesson_completions')
      .select('course_id, lesson_id')
      .eq('student_id', studentId);
    setCompletions(new Set((lc || []).map(r => `${r.course_id}:${r.lesson_id}`)));

    // vocab_access
    const { data: va } = await window.SB
      .from('vocab_access')
      .select('word_id')
      .eq('student_id', studentId);
    setVocabAccess(new Set((va || []).map(r => r.word_id)));

    setLoading(false);
  }

  useEffect(() => { loadAll(); }, [studentId]);

  async function toggleCourse(courseId) {
    const has = courseAccess.has(courseId);
    if (has) {
      // Знімаємо доступ
      const { error } = await window.SB.from('course_access')
        .delete()
        .eq('student_id', studentId)
        .eq('course_id', courseId);
      if (error) { alert('Помилка: ' + error.message); return; }
      const next = new Set(courseAccess); next.delete(courseId); setCourseAccess(next);
    } else {
      // Даємо доступ
      const { error } = await window.SB.from('course_access').insert({
        student_id: studentId,
        course_id: courseId,
        granted_by: session.user.id
      });
      if (error) { alert('Помилка: ' + error.message); return; }
      const next = new Set(courseAccess); next.add(courseId); setCourseAccess(next);
    }
  }

  async function toggleLesson(courseId, lessonId, currentState) {
    const key = `${courseId}:${lessonId}`;
    if (currentState === 'completed') {
      // Знімаємо позначку "завершено"
      const { error } = await window.SB.from('lesson_completions')
        .delete()
        .eq('student_id', studentId)
        .eq('course_id', courseId)
        .eq('lesson_id', lessonId);
      if (error) { alert('Помилка: ' + error.message); return; }
      const next = new Set(completions); next.delete(key); setCompletions(next);
    } else if (currentState === 'granted') {
      // Позначаємо як завершено
      const { error } = await window.SB.from('lesson_completions').insert({
        student_id: studentId,
        course_id: courseId,
        lesson_id: lessonId,
        completed_by: session.user.id
      });
      if (error) { alert('Помилка: ' + error.message); return; }
      const next = new Set(completions); next.add(key); setCompletions(next);
    } else {
      // locked → надаємо доступ
      const { error } = await window.SB.from('lesson_access').insert({
        student_id: studentId,
        course_id: courseId,
        lesson_id: lessonId,
        granted_by: session.user.id
      });
      if (error) { alert('Помилка: ' + error.message); return; }
      const next = new Set(lessonAccess); next.add(key); setLessonAccess(next);
    }
  }

  async function toggleVocabWord(word) {
    const has = vocabAccess.has(word.wordId);
    if (has) {
      const { error } = await window.SB.from('vocab_access')
        .delete()
        .eq('student_id', studentId)
        .eq('word_id', word.wordId);
      if (error) { alert('Помилка: ' + error.message); return; }
      const next = new Set(vocabAccess); next.delete(word.wordId); setVocabAccess(next);
    } else {
      const { error } = await window.SB.from('vocab_access').insert({
        student_id: studentId,
        word_id: word.wordId,
        granted_by: session.user.id
      });
      if (error) { alert('Помилка: ' + error.message); return; }
      const next = new Set(vocabAccess); next.add(word.wordId); setVocabAccess(next);
    }
  }

  async function handleDelete() {
    setDeleting(true);
    // Видаляємо профіль (це каскадно видалить course_access, lesson_access тощо)
    // Auth user залишається в auth.users — але без профілю не зможе увійти
    const { error } = await window.SB.from('profiles').delete().eq('id', studentId);
    if (error) {
      alert('Помилка видалення: ' + error.message);
      setDeleting(false);
      return;
    }
    // Спробуємо видалити з auth.users теж (може не спрацювати без service_role, але це ОК)
    // При успіху повертаємось на список
    setDeleting(false);
    setRoute({ page: 'students' });
  }

  if (loading) return <main className="page"><div className="empty-inline">Завантажую...</div></main>;
  if (error) return <main className="page"><div className="modal-error">{error}</div></main>;
  if (!student) return null;

  return (
    <main className="page">
      <Crumbs items={[
        { label: 'Library', onClick: goHome },
        { label: 'Учні', onClick: () => setRoute({ page: 'students' }) },
        { label: student.display_name || student.username, current: true }
      ]} />

      <div className="student-header-card">
        <div className="student-header-avatar">{initialsFor(student.display_name || student.username)}</div>
        <div className="student-header-info">
          <h1 className="student-header-name">{student.display_name || student.username}</h1>
          <div className="student-header-username">@{student.username} · створено {new Date(student.created_at).toLocaleDateString('uk-UA')}</div>
        </div>
        <div className="student-header-actions">
          <button className="student-danger-btn" onClick={() => setShowDelete(true)}>
            <Trash2 size={14} /> Видалити учня
          </button>
        </div>
      </div>

      <section className="access-section">
        <h2 className="access-section-title">Доступ до курсів та уроків</h2>
        <p className="access-section-sub">Перемикачем відкриваєш весь курс. Всередині курсу можна вручну відкривати доступ до окремих уроків (учень може почати з нього) та позначати уроки як завершені.</p>

        {COURSES.map(course => {
          const hasCourseAccess = courseAccess.has(course.id);
          const allLessons = course.units.flatMap(u => u.lessons.map(l => ({ ...l, unitTitle: u.title, unitNumber: u.number })));
          return (
            <div key={course.id} className="access-course-block">
              <div className="access-course-head">
                <div className="access-course-name">{course.title}</div>
                <div className="access-course-meta">{course.units.length} юніт(и) · {allLessons.length} уроків</div>
                <label className="toggle-switch">
                  <input type="checkbox" checked={hasCourseAccess} onChange={() => toggleCourse(course.id)} />
                  <span className="toggle-slider" />
                </label>
              </div>
              {hasCourseAccess && (
                <div className="access-lessons">
                  {allLessons.map(lesson => {
                    const key = `${course.id}:${lesson.id}`;
                    const isCompleted = completions.has(key);
                    const isGranted = lessonAccess.has(key);
                    const state = isCompleted ? 'completed' : (isGranted ? 'granted' : 'locked');
                    return (
                      <div key={lesson.id} className="access-lesson-row">
                        <div className="access-lesson-num">L{lesson.number}</div>
                        <div className="access-lesson-name">{lesson.title}</div>
                        <button
                          className={`access-lesson-btn ${state}`}
                          onClick={() => toggleLesson(course.id, lesson.id, state)}
                          title={
                            state === 'locked' ? 'Клікни, щоб відкрити доступ' :
                            state === 'granted' ? 'Клікни, щоб позначити як завершений' :
                            'Клікни, щоб зняти "завершено"'
                          }
                        >
                          {state === 'locked' && <React.Fragment><Lock size={11} /> Закрито</React.Fragment>}
                          {state === 'granted' && <React.Fragment><Unlock size={11} /> Відкрито</React.Fragment>}
                          {state === 'completed' && <React.Fragment><Check size={11} /> Завершено</React.Fragment>}
                        </button>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </section>

      <VocabAccessSection
        student={student}
        allVocabItems={allVocabItems}
        completions={completions}
        vocabAccess={vocabAccess}
        toggleVocabWord={toggleVocabWord}
      />

      {showDelete && (
        <DeleteStudentModal
          student={student}
          onClose={() => setShowDelete(false)}
          onConfirm={handleDelete}
          deleting={deleting}
        />
      )}
    </main>
  );
}

// TEACHER: HOMEWORK REVIEW

function HomeworkReviewPage({ session, goHome, setRoute }) {
  const [submissions, setSubmissions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [selected, setSelected] = useState(null); // submission обраний для перевірки
  const [filter, setFilter] = useState('pending'); // pending | all

  async function loadSubmissions() {
    setLoading(true);
    let query = window.SB
      .from('homework_submissions')
      .select('*')
      .order('submitted_at', { ascending: false });
    if (filter === 'pending') query = query.eq('status', 'submitted');
    const { data: subs, error } = await query;
    if (error) {
      setError(error.message);
      setLoading(false);
      return;
    }
    // Окремо тягнемо профілі учнів для показу імен
    const studentIds = [...new Set((subs || []).map(s => s.student_id))];
    let profilesMap = new Map();
    if (studentIds.length > 0) {
      const { data: profs } = await window.SB
        .from('profiles')
        .select('id, username, display_name')
        .in('id', studentIds);
      (profs || []).forEach(p => profilesMap.set(p.id, p));
    }
    const enriched = (subs || []).map(s => ({
      ...s,
      student_profile: profilesMap.get(s.student_id) || null
    }));
    setSubmissions(enriched);
    setLoading(false);
  }

  useEffect(() => { loadSubmissions(); }, [filter]);

  // Групуємо за учнем + уроком (одна пара writing+speaking = один рядок якщо обидва здані)
  const grouped = useMemo(() => {
    const map = new Map();
    submissions.forEach(s => {
      const key = `${s.student_id}:${s.course_id}:${s.lesson_id}`;
      if (!map.has(key)) {
        const lesson = findLesson(s.course_id, s.lesson_id);
        map.set(key, {
          key,
          student: s.student_profile,
          studentId: s.student_id,
          courseId: s.course_id,
          lessonId: s.lesson_id,
          courseTitle: lesson?.course?.title || s.course_id,
          lessonNumber: lesson?.lesson?.number || '?',
          lessonTitle: lesson?.lesson?.title || s.lesson_id,
          writing: null,
          speaking: null,
          latestSubmittedAt: s.submitted_at
        });
      }
      const g = map.get(key);
      if (s.kind === 'writing') g.writing = s;
      if (s.kind === 'speaking') g.speaking = s;
      if (s.submitted_at > g.latestSubmittedAt) g.latestSubmittedAt = s.submitted_at;
    });
    return Array.from(map.values()).sort((a, b) => b.latestSubmittedAt.localeCompare(a.latestSubmittedAt));
  }, [submissions]);

  function handleReviewed() {
    setSelected(null);
    loadSubmissions(); // перезавантажуємо список
  }

  return (
    <main className="page">
      <Crumbs items={[
        { label: 'Library', onClick: goHome },
        { label: 'Учні', onClick: () => setRoute({ page: 'students' }) },
        { label: 'Домашки на перевірці', current: true }
      ]} />
      <header className="page-header">
        <div className="page-eyebrow"><span className="dot" /> Homework review</div>
        <h1 className="page-title">Домашки учнів</h1>
        <p style={{ fontSize: 16, color: 'var(--ink-2)', lineHeight: 1.6, marginTop: 14 }}>
          Тут з’являються здані домашки. Клікни на рядок, щоб переглянути, залишити коментар і прийняти або повернути на доопрацювання.
        </p>
      </header>

      <div className="hw-review-toolbar">
        <div className="hw-review-tabs">
          <button className={`hw-review-tab ${filter === 'pending' ? 'active' : ''}`} onClick={() => setFilter('pending')}>
            На перевірці
          </button>
          <button className={`hw-review-tab ${filter === 'all' ? 'active' : ''}`} onClick={() => setFilter('all')}>
            Усі домашки
          </button>
        </div>
      </div>

      {error && <div className="modal-error">{error}</div>}
      {loading && <div className="empty-inline">Завантажую...</div>}

      {!loading && grouped.length === 0 && (
        <div className="empty-inline">
          <div className="empty-inline-title">{filter === 'pending' ? 'Нічого перевіряти 🎉' : 'Ще немає жодної домашки'}</div>
          <div>{filter === 'pending' ? 'Усі здані домашки вже переглянуто. Так тримати!' : 'Учні ще не здавали жодної домашки.'}</div>
        </div>
      )}

      {!loading && grouped.length > 0 && (
        <div className="hw-review-list">
          {grouped.map(g => (
            <HomeworkReviewRow key={g.key} group={g} onClick={() => setSelected(g)} />
          ))}
        </div>
      )}

      {selected && (
        <HomeworkReviewModal
          group={selected}
          session={session}
          onClose={() => setSelected(null)}
          onReviewed={handleReviewed}
        />
      )}
    </main>
  );
}

function HomeworkReviewRow({ group, onClick }) {
  const hasWriting = !!group.writing;
  const hasSpeaking = !!group.speaking;
  const writingStatus = group.writing?.status;
  const speakingStatus = group.speaking?.status;

  return (
    <button className="hw-review-row" onClick={onClick}>
      <div className="hw-review-avatar">{initialsFor(group.student?.display_name || group.student?.username || '?')}</div>
      <div className="hw-review-info">
        <div className="hw-review-student">{group.student?.display_name || group.student?.username || 'Учень'}</div>
        <div className="hw-review-lesson">
          {group.courseTitle} · Lesson {group.lessonNumber}: {group.lessonTitle}
        </div>
        <div className="hw-review-date">
          Здано: {new Date(group.latestSubmittedAt).toLocaleString('uk-UA', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}
        </div>
      </div>
      <div className="hw-review-badges">
        {hasWriting && <HomeworkKindBadge kind="writing" status={writingStatus} />}
        {hasSpeaking && <HomeworkKindBadge kind="speaking" status={speakingStatus} />}
      </div>
      <ChevronRight size={18} className="hw-review-chevron" />
    </button>
  );
}

function HomeworkKindBadge({ kind, status }) {
  const icon = kind === 'writing' ? '✍️' : '🎤';
  const label = kind === 'writing' ? 'Writing' : 'Speaking';
  return (
    <div className={`hw-review-kind-badge status-${status}`}>
      <span>{icon}</span>
      <span>{label}</span>
      {status === 'accepted' && <span className="hw-review-kind-mark">✓</span>}
      {status === 'returned' && <span className="hw-review-kind-mark">↻</span>}
      {status === 'submitted' && <span className="hw-review-kind-mark hw-review-kind-mark-new">•</span>}
    </div>
  );
}

// Модалка перевірки — велика, з обома частинами
function HomeworkReviewModal({ group, session, onClose, onReviewed }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal hw-review-modal" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose} aria-label="Закрити"><X size={18} /></button>
        <div className="hw-review-modal-head">
          <h2 className="modal-title">{group.student?.display_name || group.student?.username}</h2>
          <div style={{ fontSize: 13.5, color: 'var(--ink-2)', marginTop: 2 }}>
            {group.courseTitle} · Lesson {group.lessonNumber}: {group.lessonTitle}
          </div>
        </div>

        <div className="hw-review-parts">
          {group.writing && (
            <HomeworkReviewPart
              submission={group.writing}
              kind="writing"
              icon="✍️"
              session={session}
              onReviewed={onReviewed}
            />
          )}
          {group.speaking && (
            <HomeworkReviewPart
              submission={group.speaking}
              kind="speaking"
              icon="🎤"
              session={session}
              onReviewed={onReviewed}
            />
          )}
        </div>
      </div>
    </div>
  );
}

// Одна секція перевірки — writing або speaking
function HomeworkReviewPart({ submission, kind, icon, session, onReviewed }) {
  const [comment, setComment] = useState(submission.teacher_comment || '');
  const [saving, setSaving] = useState(false);
  const [error, setError] = useState('');
  const [audioUrl, setAudioUrl] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(false);
  const [deleting, setDeleting] = useState(false);

  // Тягнемо підписаний URL для аудіо
  useEffect(() => {
    if (kind !== 'speaking' || !submission.content_audio_url) return;
    async function load() {
      const { data } = await window.SB.storage
        .from('homework-audio')
        .createSignedUrl(submission.content_audio_url, 3600);
      if (data) setAudioUrl(data.signedUrl);
    }
    load();
  }, [submission.content_audio_url, kind]);

  async function handleDelete() {
    setError('');
    setDeleting(true);
    const { error } = await deleteHomeworkSubmission(submission);
    setDeleting(false);
    if (error) {
      setError('Помилка видалення: ' + error.message);
      return;
    }
    onReviewed();
  }

  async function updateStatus(newStatus) {
    setError('');
    setSaving(true);
    const { error } = await window.SB.from('homework_submissions')
      .update({
        status: newStatus,
        teacher_comment: comment.trim() || null,
        reviewed_at: new Date().toISOString(),
        reviewed_by: session.user.id
      })
      .eq('id', submission.id);
    setSaving(false);
    if (error) {
      setError(error.message);
      return;
    }
    onReviewed();
  }

  const isReviewed = submission.status !== 'submitted';

  return (
    <div className={`hw-review-part hw-review-part-${kind}`}>
      <div className="hw-review-part-head">
        <span className="hw-review-part-icon">{icon}</span>
        <div>
          <div className="hw-review-part-kind">{kind === 'writing' ? 'Writing' : 'Speaking'}</div>
          <div className="hw-review-part-status" data-status={submission.status}>
            {submission.status === 'submitted' && '🟡 На перевірці'}
            {submission.status === 'accepted' && '🟢 Прийнято'}
            {submission.status === 'returned' && '🔴 Повернуто на доопрацювання'}
          </div>
        </div>
      </div>

      {kind === 'writing' && (
        <div className="hw-review-content">
          <div className="hw-review-content-label">Відповідь учня</div>
          <div className="hw-review-content-text">{submission.content_text}</div>
        </div>
      )}

      {kind === 'speaking' && (
        <div className="hw-review-content">
          <div className="hw-review-content-label">Запис учня</div>
          {audioUrl ? (
            <audio controls src={audioUrl} style={{ width: '100%', marginTop: 8 }} />
          ) : (
            <div style={{ color: 'var(--ink-3)', fontStyle: 'italic', padding: '10px 0' }}>Завантажую аудіо...</div>
          )}
        </div>
      )}

      <div className="hw-review-comment-field">
        <label className="hw-form-label">Твій коментар (необов'язково)</label>
        <textarea
          className="hw-textarea"
          value={comment}
          onChange={e => setComment(e.target.value)}
          placeholder={kind === 'writing' ? "Наприклад: чудова робота! Але «goed» → «went». І перегляньте артиклі в 2 реченні." : "Наприклад: гарне вимовляння, тільки уповільни трохи на другій частині."}
          rows={3}
          disabled={saving}
        />
      </div>

      {error && <div className="hw-form-error">{error}</div>}

      <div className="hw-review-actions">
        {confirmDelete ? (
          <div className="hw-review-delete-confirm">
            <span>Точно видалити цю здачу?</span>
            <button className="modal-btn ghost" onClick={() => setConfirmDelete(false)} disabled={deleting}>
              Скасувати
            </button>
            <button className="modal-btn danger" onClick={handleDelete} disabled={deleting}>
              {deleting ? '...' : 'Так, видалити'}
            </button>
          </div>
        ) : (
          <React.Fragment>
            <button
              className="modal-btn ghost hw-review-delete-btn"
              onClick={() => setConfirmDelete(true)}
              disabled={saving}
              title="Видалити цю здачу"
            >
              <Trash2 size={13} /> Видалити
            </button>
            <div style={{ flex: 1 }} />
            <button
              className="modal-btn danger"
              onClick={() => updateStatus('returned')}
              disabled={saving}
              title="Повернути учню на доопрацювання"
            >
              ↻ Повернути
            </button>
            <button
              className="modal-btn primary"
              onClick={() => updateStatus('accepted')}
              disabled={saving}
              title="Прийняти цю частину"
            >
              {saving ? '...' : '✓ Прийняти'}
            </button>
          </React.Fragment>
        )}
      </div>

      {isReviewed && (
        <div style={{ fontSize: 12, color: 'var(--ink-3)', fontStyle: 'italic', marginTop: 8, textAlign: 'right' }}>
          Оцінено раніше · {new Date(submission.reviewed_at).toLocaleString('uk-UA', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' })}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// TEACHER: Lesson panel (внизу сторінки уроку, тільки для teacher)
// ═══════════════════════════════════════════════════════════

function TeacherLessonPanel({ courseId, lessonId, lesson, course, session, nextLesson }) {
  const [expanded, setExpanded] = useState(false);
  const [students, setStudents] = useState([]);
  const [selectedStudentId, setSelectedStudentId] = useState('');
  const [state, setState] = useState({
    courseAccess: false,
    lessonAccess: false,
    completed: false,
    writing: null,
    speaking: null,
  });
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [message, setMessage] = useState('');

  // Тягнемо список учнів (тільки при відкритті)
  useEffect(() => {
    if (!expanded || students.length > 0) return;
    async function load() {
      const { data } = await window.SB
        .from('profiles')
        .select('id, username, display_name')
        .eq('role', 'student')
        .order('display_name', { ascending: true });
      setStudents(data || []);
    }
    load();
  }, [expanded]);

  // При зміні обраного учня — тягнемо його стан для цього уроку
  useEffect(() => {
    if (!selectedStudentId) return;
    async function load() {
      setLoading(true);
      const [ca, la, lc, hw] = await Promise.all([
        window.SB.from('course_access').select('*').eq('student_id', selectedStudentId).eq('course_id', courseId).maybeSingle(),
        window.SB.from('lesson_access').select('*').eq('student_id', selectedStudentId).eq('course_id', courseId).eq('lesson_id', lessonId).maybeSingle(),
        window.SB.from('lesson_completions').select('*').eq('student_id', selectedStudentId).eq('course_id', courseId).eq('lesson_id', lessonId).maybeSingle(),
        window.SB.from('homework_submissions').select('*').eq('student_id', selectedStudentId).eq('course_id', courseId).eq('lesson_id', lessonId),
      ]);
      setState({
        courseAccess: !!ca.data,
        lessonAccess: !!la.data,
        completed: !!lc.data,
        writing: (hw.data || []).find(x => x.kind === 'writing') || null,
        speaking: (hw.data || []).find(x => x.kind === 'speaking') || null,
      });
      setLoading(false);
    }
    load();
  }, [selectedStudentId, courseId, lessonId]);

  async function markCompleted() {
    setSaving(true);
    setMessage('');
    // 1. Створюємо lesson_completion
    const { error: compError } = await window.SB.from('lesson_completions').insert({
      student_id: selectedStudentId,
      course_id: courseId,
      lesson_id: lessonId,
      completed_by: session.user.id
    });
    if (compError && !compError.message.includes('duplicate')) {
      setMessage('Помилка: ' + compError.message);
      setSaving(false);
      return;
    }
    // 2. Автоматично відкриваємо доступ до наступного уроку (якщо є)
    if (nextLesson) {
      const { error: accessError } = await window.SB.from('lesson_access').insert({
        student_id: selectedStudentId,
        course_id: courseId,
        lesson_id: nextLesson.id,
        granted_by: session.user.id
      });
      if (accessError && !accessError.message.includes('duplicate')) {
        setMessage('Урок завершено, але не вдалося відкрити наступний: ' + accessError.message);
        setSaving(false);
        return;
      }
    }
    setState(prev => ({ ...prev, completed: true }));
    setMessage(nextLesson ? `✓ Урок завершено. Наступний (L${nextLesson.number}) автоматично відкрито учню!` : '✓ Урок завершено. Це був останній урок курсу — вітаю з випуском!');
    setSaving(false);
  }

  async function unmarkCompleted() {
    setSaving(true);
    setMessage('');
    const { error } = await window.SB.from('lesson_completions')
      .delete()
      .eq('student_id', selectedStudentId)
      .eq('course_id', courseId)
      .eq('lesson_id', lessonId);
    if (error) {
      setMessage('Помилка: ' + error.message);
      setSaving(false);
      return;
    }
    setState(prev => ({ ...prev, completed: false }));
    setMessage('Позначку "завершено" знято. Наступний урок залишається відкритим (якщо був).');
    setSaving(false);
  }

  async function grantLessonAccess() {
    setSaving(true);
    setMessage('');
    const { error } = await window.SB.from('lesson_access').insert({
      student_id: selectedStudentId,
      course_id: courseId,
      lesson_id: lessonId,
      granted_by: session.user.id
    });
    if (error && !error.message.includes('duplicate')) {
      setMessage('Помилка: ' + error.message);
      setSaving(false);
      return;
    }
    setState(prev => ({ ...prev, lessonAccess: true }));
    setMessage('✓ Доступ до уроку відкрито');
    setSaving(false);
  }

  const selectedStudent = students.find(s => s.id === selectedStudentId);
  const canMarkComplete = selectedStudentId && state.courseAccess && (state.lessonAccess || state.completed);

  return (
    <div className={`teacher-lesson-panel ${expanded ? 'expanded' : ''}`}>
      <button className="teacher-panel-toggle" onClick={() => setExpanded(!expanded)}>
        <span className="teacher-panel-toggle-icon">👨‍🏫</span>
        <span className="teacher-panel-toggle-label">
          Панель вчителя {expanded ? '▾' : '▴'}
        </span>
      </button>

      {expanded && (
        <div className="teacher-panel-body">
          <div className="teacher-panel-title">Керування уроком для учня</div>

          <div className="teacher-panel-field">
            <label className="teacher-panel-label">Оберіть учня</label>
            <select
              className="teacher-panel-select"
              value={selectedStudentId}
              onChange={e => { setSelectedStudentId(e.target.value); setMessage(''); }}
            >
              <option value="">— оберіть учня —</option>
              {students.map(s => (
                <option key={s.id} value={s.id}>{s.display_name || s.username}</option>
              ))}
            </select>
          </div>

          {selectedStudentId && loading && (
            <div style={{ color: 'var(--ink-3)', fontSize: 13, fontStyle: 'italic', padding: '10px 0' }}>Завантажую стан...</div>
          )}

          {selectedStudentId && !loading && (
            <React.Fragment>
              <div className="teacher-panel-status-grid">
                <div className={`teacher-panel-status-item ${state.courseAccess ? 'ok' : 'warn'}`}>
                  <div className="teacher-panel-status-label">Курс</div>
                  <div className="teacher-panel-status-value">{state.courseAccess ? '✓ Відкрито' : '✗ Немає доступу'}</div>
                </div>
                <div className={`teacher-panel-status-item ${state.completed ? 'ok' : state.lessonAccess ? 'info' : 'warn'}`}>
                  <div className="teacher-panel-status-label">Урок</div>
                  <div className="teacher-panel-status-value">
                    {state.completed ? '✓ Завершено' : state.lessonAccess ? '🔓 Відкрито' : '🔒 Закрито'}
                  </div>
                </div>
                <div className={`teacher-panel-status-item ${statusColor(state.writing?.status)}`}>
                  <div className="teacher-panel-status-label">Writing</div>
                  <div className="teacher-panel-status-value">{formatHwStatus(state.writing)}</div>
                </div>
                <div className={`teacher-panel-status-item ${statusColor(state.speaking?.status)}`}>
                  <div className="teacher-panel-status-label">Speaking</div>
                  <div className="teacher-panel-status-value">{formatHwStatus(state.speaking)}</div>
                </div>
              </div>

              {!state.courseAccess && (
                <div className="teacher-panel-hint warn">
                  ⚠️ Учень не має доступу до цього курсу. Спершу відкрий йому доступ у розділі «Учні».
                </div>
              )}

              {state.courseAccess && !state.lessonAccess && !state.completed && (
                <button
                  className="teacher-panel-btn ghost"
                  onClick={grantLessonAccess}
                  disabled={saving}
                >
                  🔓 Спершу відкрити доступ до уроку
                </button>
              )}

              {canMarkComplete && !state.completed && (
                <button
                  className="teacher-panel-btn primary"
                  onClick={markCompleted}
                  disabled={saving}
                >
                  {saving ? 'Зберігаю...' : nextLesson
                    ? `✓ Завершити урок і відкрити L${nextLesson.number}`
                    : '✓ Завершити урок (це останній)'}
                </button>
              )}

              {state.completed && (
                <button
                  className="teacher-panel-btn danger-outline"
                  onClick={unmarkCompleted}
                  disabled={saving}
                >
                  ↩ Скасувати позначку "завершено"
                </button>
              )}

              {message && (
                <div className={`teacher-panel-message ${message.startsWith('✓') ? 'ok' : message.startsWith('Помилка') ? 'error' : 'info'}`}>
                  {message}
                </div>
              )}
            </React.Fragment>
          )}
        </div>
      )}
    </div>
  );
}

// Видалення домашки: спочатку файл зі Storage (якщо speaking), потім рядок з БД
// ═══════════════════════════════════════════════════════════
// SPACED REPETITION (SM-2 lite)
// ═══════════════════════════════════════════════════════════

// Розраховуємо новий стан картки після оцінювання
// current: { ease_factor, interval_days, repetitions } (або undefined для нової)
// grade: 0 (не знаю) | 3 (складно) | 4 (добре) | 5 (легко)
function computeNextReview(current, grade) {
  const now = new Date();
  let ease = current?.ease_factor ?? 2.5;
  let interval = current?.interval_days ?? 0;
  let repetitions = current?.repetitions ?? 0;

  if (grade === 0) {
    // Не знаю — обнуляємо repetitions, показуємо завтра
    repetitions = 0;
    interval = 1;
    ease = Math.max(1.3, ease - 0.2);
  } else {
    // Знаю (3, 4, 5)
    if (repetitions === 0) {
      interval = 1;
    } else if (repetitions === 1) {
      interval = 6;
    } else {
      interval = Math.round(interval * ease);
    }
    repetitions++;

    if (grade === 3) ease = Math.max(1.3, ease - 0.15);
    else if (grade === 5) ease = ease + 0.10;
    // grade === 4: без змін
  }

  const nextReview = new Date(now);
  nextReview.setDate(nextReview.getDate() + interval);

  return {
    ease_factor: parseFloat(ease.toFixed(2)),
    interval_days: interval,
    repetitions,
    last_grade: grade,
    last_reviewed_at: now.toISOString(),
    next_review_at: nextReview.toISOString(),
  };
}

// Форматуємо інтервал для показу («завтра», «через 3 дні», «через 2 місяці»)
function formatInterval(days) {
  if (days === 0) return 'сьогодні';
  if (days === 1) return 'завтра';
  if (days < 7) return `через ${days} дн.`;
  if (days < 30) return `через ${Math.round(days / 7)} тижн.`;
  if (days < 365) return `через ${Math.round(days / 30)} міс.`;
  return `через ${Math.round(days / 365)} р.`;
}

async function deleteHomeworkSubmission(submission) {
  // Якщо це speaking — прибираємо аудіо-файл
  if (submission.kind === 'speaking' && submission.content_audio_url) {
    const { error: storageError } = await window.SB.storage
      .from('homework-audio')
      .remove([submission.content_audio_url]);
    if (storageError) {
      console.warn('Не вдалося видалити аудіо-файл:', storageError.message);
      // Не зупиняємось — все одно видаляємо запис із БД
    }
  }
  const { error } = await window.SB
    .from('homework_submissions')
    .delete()
    .eq('id', submission.id);
  return { error };
}

// Utility функції для статусу домашки
function statusColor(status) {
  if (status === 'accepted') return 'ok';
  if (status === 'submitted') return 'info';
  if (status === 'returned') return 'warn';
  return '';
}

function formatHwStatus(hw) {
  if (!hw) return '— не здано';
  if (hw.status === 'submitted') return '🟡 На перевірці';
  if (hw.status === 'accepted') return '🟢 Прийнято';
  if (hw.status === 'returned') return '🔴 Повернуто';
  return hw.status;
}

// ═══════════════════════════════════════════════════════════
// FLASHCARDS PAGE
// ═══════════════════════════════════════════════════════════

function FlashcardsPage({ session, mode, courseId, lessonId, canSeeVocabWord, goHome, setRoute }) {
  // mode: 'lesson' (тренуємо всі слова з певного уроку) | 'due' (усі слова на повторення сьогодні)
  const allItems = useMemo(() => getAllVocabItems(), []);
  const [cards, setCards] = useState([]);         // масив карток для тренування
  const [currentIndex, setCurrentIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [progressMap, setProgressMap] = useState(new Map()); // wordId → row з vocab_progress
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [stats, setStats] = useState({ notKnown: 0, hard: 0, good: 0, easy: 0 });
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    async function load() {
      setLoading(true);
      // 1. Тягнемо весь vocab_progress учня
      const { data: progressRows, error: progError } = await window.SB
        .from('vocab_progress')
        .select('*')
        .eq('student_id', session.user.id);
      if (progError) {
        setError('Не вдалося завантажити прогрес: ' + progError.message);
        setLoading(false);
        return;
      }
      const pMap = new Map();
      (progressRows || []).forEach(p => pMap.set(p.word_id, p));
      setProgressMap(pMap);

      // 2. Відбираємо картки залежно від режиму
      let selectedCards = [];
      const now = new Date();
      if (mode === 'lesson' && courseId && lessonId) {
        // Тренуємо всі слова з цього уроку (без фільтру за терміном)
        selectedCards = allItems.filter(w =>
          w.courseId === courseId && w.lessonId === lessonId && canSeeVocabWord(w)
        );
      } else if (mode === 'due') {
        // Тренуємо лише ті, що вже готові до повторення
        const dueWordIds = new Set(
          (progressRows || [])
            .filter(p => new Date(p.next_review_at) <= now)
            .map(p => p.word_id)
        );
        // + всі, які ніколи ще не бачив — теж потрапляють у "нові на сьогодні"
        selectedCards = allItems.filter(w => {
          if (!canSeeVocabWord(w)) return false;
          return dueWordIds.has(w.wordId) || !pMap.has(w.wordId);
        });
        // Обмежуємо: максимум 20 карток за сесію, щоб не перевантажити
        selectedCards = selectedCards.slice(0, 20);
      }

      // Перемішуємо
      selectedCards = shuffle(selectedCards);
      setCards(selectedCards);
      setCurrentIndex(0);
      setFlipped(false);
      setLoading(false);
    }
    load();
  }, [mode, courseId, lessonId, session.user.id]);

  // Клавіатура: пробіл — перевернути; 1/2/3/4 — оцінити
  useEffect(() => {
    function handleKey(e) {
      if (!cards.length || currentIndex >= cards.length) return;
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        setFlipped(f => !f);
      } else if (flipped) {
        if (e.key === '1') gradeCard(0);
        else if (e.key === '2') gradeCard(3);
        else if (e.key === '3') gradeCard(4);
        else if (e.key === '4') gradeCard(5);
      }
    }
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [cards, currentIndex, flipped]);

  async function gradeCard(grade) {
    if (saving) return;
    setSaving(true);
    const card = cards[currentIndex];
    const existing = progressMap.get(card.wordId);
    const next = computeNextReview(existing, grade);

    // Upsert у vocab_progress
    const payload = {
      student_id: session.user.id,
      word_id: card.wordId,
      ...next,
    };
    const { error } = await window.SB
      .from('vocab_progress')
      .upsert(payload, { onConflict: 'student_id,word_id' });

    if (error) {
      alert('Помилка збереження: ' + error.message);
      setSaving(false);
      return;
    }

    // Оновлюємо локальну мапу
    const newMap = new Map(progressMap);
    newMap.set(card.wordId, { ...(existing || {}), ...payload });
    setProgressMap(newMap);

    // Рахуємо статистику
    setStats(prev => ({
      notKnown: prev.notKnown + (grade === 0 ? 1 : 0),
      hard: prev.hard + (grade === 3 ? 1 : 0),
      good: prev.good + (grade === 4 ? 1 : 0),
      easy: prev.easy + (grade === 5 ? 1 : 0),
    }));

    // Переходимо на наступну картку
    setFlipped(false);
    setCurrentIndex(prev => prev + 1);
    setSaving(false);
  }

  const finished = !loading && cards.length > 0 && currentIndex >= cards.length;
  const empty = !loading && cards.length === 0;
  const current = cards[currentIndex];

  return (
    <main className="page flashcards-page">
      <Crumbs items={[
        { label: 'Library', onClick: goHome },
        { label: 'Vocabulary Bank', onClick: () => setRoute({ page: 'vocabulary' }) },
        { label: 'Тренування', current: true }
      ]} />

      {loading && <div className="empty-inline">Завантажую картки...</div>}
      {error && <div className="modal-error">{error}</div>}

      {empty && (
        <div className="empty-inline" style={{ marginTop: 40 }}>
          <div className="empty-inline-title" style={{ fontSize: 22 }}>
            {mode === 'due' ? '🎉 На сьогодні все повторено!' : 'Немає слів для тренування'}
          </div>
          <div style={{ marginTop: 10 }}>
            {mode === 'due'
              ? 'Приходь завтра — з’являться нові картки для повторення.'
              : 'Спробуй інший урок або зачекай, поки відкриється більше слів.'}
          </div>
          <button className="fc-back-btn" onClick={() => setRoute({ page: 'vocabulary' })} style={{ marginTop: 20 }}>
            ← Повернутись до Vocabulary Bank
          </button>
        </div>
      )}

      {!loading && cards.length > 0 && !finished && (
        <React.Fragment>
          <div className="fc-progress-bar">
            <div className="fc-progress-fill" style={{ width: `${((currentIndex) / cards.length) * 100}%` }} />
          </div>
          <div className="fc-progress-text">
            <span>{currentIndex} / {cards.length}</span>
            <span className="fc-hint-kb">
              {flipped ? 'Оцініть себе: 1 · 2 · 3 · 4' : 'Пробіл або клік — перевернути картку'}
            </span>
          </div>

          <div className={`flashcard ${flipped ? 'flipped' : ''}`} onClick={() => setFlipped(f => !f)}>
            <div className="flashcard-inner">
              {/* FRONT */}
              <div className={`flashcard-face flashcard-front accent-${current.accent || 'sage'}`}>
                <div className="flashcard-emoji">{current.emoji}</div>
                <div className="flashcard-word">{current.en}</div>
                <div className="flashcard-hint">натисни, щоб побачити переклад</div>
              </div>
              {/* BACK */}
              <div className={`flashcard-face flashcard-back accent-${current.accent || 'sage'}`}>
                <div className="flashcard-uk">{current.uk}</div>
                {current.explain && <div className="flashcard-explain">{current.explain}</div>}

          <div className="fc-stats">
            <div className="fc-stat fc-stat-notknown">
              <div className="fc-stat-num">{stats.notKnown}</div>
              <div className="fc-stat-label">😅 Не знаю</div>
            </div>
            <div className="fc-stat fc-stat-hard">
              <div className="fc-stat-num">{stats.hard}</div>
              <div className="fc-stat-label">🤔 Складно</div>
            </div>
            <div className="fc-stat fc-stat-good">
              <div className="fc-stat-num">{stats.good}</div>
              <div className="fc-stat-label">🙂 Добре</div>

              <div className="fc-stat-num">{stats.easy}</div>

          <div className="fc-finished-actions">

            <button className="fc-again-btn" onClick={() => {
              setStats({ notKnown: 0, hard: 0, good: 0, easy: 0 });
              setCurrentIndex(0);
              setCards(shuffle(cards));
            }}>
              🔄 Пройти ще раз
            </button>
          </div>
        </div>
      )}
    </main>
  );
}

function AuthPage({ onAuth }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);

  async function handleSubmit(e) {
    if (e) e.preventDefault();
    setError('');
    if (!username.trim() || !password) {
      setError('Введи ім\u2019я і пароль');
      return;
    }
    setLoading(true);
    try {
      const email = username.trim().toLowerCase() + '@inkwell.local';
      const { data, error: authError } = await window.SB.auth.signInWithPassword({
        email,
        password,
      });
      if (authError) {
        if (authError.message.toLowerCase().includes('invalid')) {
          setError('Неправильне ім\u2019я або пароль');
        } else {
          setError(authError.message);
        }
        setLoading(false);
        return;
      }
      // Успіх — тягнемо профіль
      const { data: profile, error: profileError } = await window.SB
        .from('profiles')
        .select('*')
        .eq('id', data.user.id)
        .single();
      if (profileError || !profile) {
        setError('Не вдалося завантажити профіль. Зверніться до вчителя.');
        await window.SB.auth.signOut();
        setLoading(false);
        return;
      }
      // Якщо teacher — зберігаємо пароль в пам'яті сесії для швидкого створення учнів
      if (profile.role === 'teacher') {
        window.__inkwell_teacher_pw = password;
      }
      onAuth({ user: data.user, profile });
    } catch (err) {
      setError('Помилка з\u2019єднання: ' + err.message);
      setLoading(false);
    }
  }

  return (
    <div className="auth-page">
      <div className="auth-card">
        <div className="auth-brand">
          <div className="auth-brand-icon"><BookOpen size={18} /></div>
          <div className="auth-brand-name">Inkwell</div>
        </div>
        <h1 className="auth-title">Вхід</h1>
        <p className="auth-subtitle">Введи своє ім\u2019я і пароль, щоб продовжити. Якщо в тебе ще немає акаунта — попроси вчителя його створити.</p>
        {error && <div className="auth-error">{error}</div>}
        <div className="auth-field">
          <label className="auth-label" htmlFor="auth-username">Ім\u2019я користувача</label>
          <input
            id="auth-username"
            className="auth-input"
            type="text"
            autoComplete="username"
            value={username}
            onChange={e => setUsername(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
            placeholder="наприклад, taras"
            disabled={loading}
            autoFocus
          />
        </div>
        <div className="auth-field">
          <label className="auth-label" htmlFor="auth-password">Пароль</label>
          <input
            id="auth-password"
            className="auth-input"
            type="password"
            autoComplete="current-password"
            value={password}
            onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && handleSubmit()}
            placeholder="твій пароль"
            disabled={loading}
          />
        </div>
        <button className="auth-submit" onClick={handleSubmit} disabled={loading}>
          {loading ? 'Заходжу...' : 'Увійти'}
        </button>
        <div className="auth-hint">Бібліотека курсів для учнів 10–17 років</div>
      </div>
    </div>
  );
}

function AuthGate() {
  const [status, setStatus] = useState('checking'); // checking | authed | anon
  const [session, setSession] = useState(null);

  useEffect(() => {
    // Спочатку перевіряємо, чи вже є активна сесія
    async function check() {
      const { data: { session: currentSession } } = await window.SB.auth.getSession();
      if (currentSession) {
        // Завантажуємо профіль
        const { data: profile } = await window.SB
          .from('profiles')
          .select('*')
          .eq('id', currentSession.user.id)
          .single();
        if (profile) {
          setSession({ user: currentSession.user, profile });
          setStatus('authed');
        } else {
          // Сесія є, але профілю нема — розлогінюємо
          await window.SB.auth.signOut();
          setStatus('anon');
        }
      } else {
        setStatus('anon');
      }
    }
    check();

    // Слухаємо зміни авторизації (SIGN_OUT з іншої вкладки тощо)
    const { data: sub } = window.SB.auth.onAuthStateChange((event) => {
      if (event === 'SIGNED_OUT') {
        setSession(null);
        setStatus('anon');
      }
    });
    return () => sub.subscription.unsubscribe();
  }, []);

  async function handleLogout() {
    await window.SB.auth.signOut();
    window.__inkwell_teacher_pw = null;
    setSession(null);
    setStatus('anon');
  }

  if (status === 'checking') {
    return (
      <div className="auth-page">
        <div style={{ color: 'var(--ink-3)', fontSize: 14 }}>Перевіряю вхід...</div>
      </div>
    );
  }

  if (status === 'anon' || !session) {
    return <AuthPage onAuth={(s) => { setSession(s); setStatus('authed'); }} />;
  }

  return <App session={session} onLogout={handleLogout} />;
}

function App({ session, onLogout }) {
  const [theme, setTheme] = useState('light');
  const [route, setRoute] = useState({ page: 'home' });
  const [query, setQuery] = useState('');
  const [activeFilters, setActiveFilters] = useState({ level: [], age: [], type: [] });
  const [favorites, setFavorites] = useState(new Set());
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [mobileMenu, setMobileMenu] = useState(false);
  useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [route]);
  const allLessons = useMemo(() => getAllLessons(), []);

  // ── Permissions state (для учня) ──
  const isTeacher = session.profile.role === 'teacher';

  // ── Pending homework counter (для teacher) ──
  const [pendingHomeworkCount, setPendingHomeworkCount] = useState(0);

  useEffect(() => {
    if (!isTeacher) return;
    async function loadPending() {
      const { count } = await window.SB
        .from('homework_submissions')
        .select('*', { count: 'exact', head: true })
        .eq('status', 'submitted');
      setPendingHomeworkCount(count || 0);
    }
    loadPending();
    // Оновлюємо кожні 30 секунд + при кожній зміні route
    const interval = setInterval(loadPending, 30000);
    return () => clearInterval(interval);
  }, [isTeacher, route]);
  const [permissions, setPermissions] = useState({
    loading: !isTeacher, // teacher бачить все, не треба чекати
    courseAccess: new Set(),   // course_id
    lessonAccess: new Set(),   // 'courseId:lessonId'
    completions: new Set(),    // 'courseId:lessonId'
    vocabAccess: new Set(),    // word_id (ручний доступ до окремих слів)
  });

  useEffect(() => {
    if (isTeacher) return; // Teacher має доступ до всього
    // Тягнемо permissions учня
    async function load() {
      const [ca, la, lc, va] = await Promise.all([
        window.SB.from('course_access').select('course_id').eq('student_id', session.user.id),
        window.SB.from('lesson_access').select('course_id, lesson_id').eq('student_id', session.user.id),
        window.SB.from('lesson_completions').select('course_id, lesson_id').eq('student_id', session.user.id),
        window.SB.from('vocab_access').select('word_id').eq('student_id', session.user.id),
      ]);
      setPermissions({
        loading: false,
        courseAccess: new Set((ca.data || []).map(r => r.course_id)),
        lessonAccess: new Set((la.data || []).map(r => `${r.course_id}:${r.lesson_id}`)),
        completions: new Set((lc.data || []).map(r => `${r.course_id}:${r.lesson_id}`)),
        vocabAccess: new Set((va.data || []).map(r => r.word_id)),
      });
    }
    load();
  }, [session.user.id, isTeacher]);

  // Функції доступу
  const canSeeCourse = (courseId) => isTeacher || permissions.courseAccess.has(courseId);
  const canSeeLesson = (courseId, lessonId) => {
    if (isTeacher) return true;
    const key = `${courseId}:${lessonId}`;
    return permissions.lessonAccess.has(key) || permissions.completions.has(key);
  };
  const isLessonCompleted = (courseId, lessonId) => permissions.completions.has(`${courseId}:${lessonId}`);
  // Vocab: учень бачить слово, якщо (а) урок завершений АБО (б) слово вручну відкрито
  const canSeeVocabWord = (word) => {
    if (isTeacher) return true;
    const lessonKey = `${word.courseId}:${word.lessonId}`;
    return permissions.completions.has(lessonKey) || permissions.vocabAccess.has(word.wordId);
  };

  // Курси, які видимі поточному користувачу
  const visibleCourses = useMemo(() => {
    if (isTeacher) return COURSES;
    return COURSES.filter(c => permissions.courseAccess.has(c.id));
  }, [isTeacher, permissions.courseAccess]);

  // Уроки, які видимі поточному користувачу
  const visibleLessons = useMemo(() => {
    if (isTeacher) return allLessons;
    return allLessons.filter(l => canSeeLesson(l.courseId, l.id));
  }, [isTeacher, allLessons, permissions.lessonAccess, permissions.completions]);

  // Уроки (показуються коли активний пошук або фільтр Type)
  const filteredLessons = useMemo(() => {
    return visibleLessons.filter(l => {
      const q = query.toLowerCase().trim();
      const matchesQuery = !q || l.title.toLowerCase().includes(q) || (l.titleUk && l.titleUk.toLowerCase().includes(q)) || l.tags.some(t => t.toLowerCase().includes(q));
      const matchesLevel = !activeFilters.level.length || activeFilters.level.includes(l.level);
      const matchesAge = !activeFilters.age.length || activeFilters.age.includes(l.age);
      const matchesType = !activeFilters.type.length || activeFilters.type.includes(l.type);
      return matchesQuery && matchesLevel && matchesAge && matchesType;
    });
  }, [query, activeFilters, visibleLessons]);

  // Курси (за замовчуванням на головній)
  const filteredCourses = useMemo(() => {
    return visibleCourses.filter(c => {
      const matchesLevel = !activeFilters.level.length || activeFilters.level.includes(c.level);
      const matchesAge = !activeFilters.age.length || activeFilters.age.includes(c.age);
      return matchesLevel && matchesAge;
    });
  }, [activeFilters, visibleCourses]);

  const toggleFilter = (group, value) => setActiveFilters(prev => ({ ...prev, [group]: prev[group].includes(value) ? prev[group].filter(v => v !== value) : [...prev[group], value] }));
  const clearFilters = () => setActiveFilters({ level: [], age: [], type: [] });
  const hasFilters = activeFilters.level.length + activeFilters.age.length + activeFilters.type.length > 0;
  const toggleFavorite = (id) => setFavorites(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; });
  const goLesson = (courseId, lessonId) => setRoute({ page: 'lesson', courseId, lessonId });
  const goCourse = (courseId) => setRoute({ page: 'course', courseId });
  const goHome = () => setRoute({ page: 'home' });

  // Режим показу на головній: уроки якщо є query або обраний Type-фільтр; інакше - курси
  const lessonMode = Boolean(query.trim()) || activeFilters.type.length > 0;

  return (
    <div className={theme === 'dark' ? 'dark' : ''}>
      <div className="app-root">
        <div className="bg-deco" aria-hidden="true">
          <div className="bg-grain" />
          <div className="bg-blob bg-blob-1" />
          <div className="bg-blob bg-blob-2" />
        </div>
        <Nav theme={theme} setTheme={setTheme} route={route} setRoute={setRoute} mobileMenu={mobileMenu} setMobileMenu={setMobileMenu} session={session} onLogout={onLogout} pendingHomeworkCount={pendingHomeworkCount} />
        {route.page === 'home' && (
          <React.Fragment>
            <Hero query={query} setQuery={setQuery} setRoute={setRoute} totalLessons={visibleLessons.length} />
            <main className="layout">
              <Sidebar open={sidebarOpen} setOpen={setSidebarOpen} activeFilters={activeFilters} toggleFilter={toggleFilter} clearFilters={clearFilters} hasFilters={hasFilters} showTypeFilter={lessonMode || activeFilters.type.length > 0} />
              <section className="content">
                <ResultHeader
                  count={lessonMode ? filteredLessons.length : filteredCourses.length}
                  query={query}
                  hasFilters={hasFilters}
                  lessonMode={lessonMode}
                />
                {lessonMode
                  ? <LessonGrid lessons={filteredLessons} favorites={favorites} toggleFavorite={toggleFavorite} goLesson={goLesson} />
                  : <CourseGrid courses={filteredCourses} goCourse={goCourse} />
                }
              </section>
            </main>
          </React.Fragment>
        )}
        {route.page === 'course' && <CoursePage courseId={route.courseId} goHome={goHome} goLesson={goLesson} canSeeLesson={canSeeLesson} isLessonCompleted={isLessonCompleted} isTeacher={isTeacher} />}
        {route.page === 'lesson' && <LessonPage courseId={route.courseId} lessonId={route.lessonId} goHome={goHome} goCourse={goCourse} goLesson={goLesson} favorites={favorites} toggleFavorite={toggleFavorite} canSeeLesson={canSeeLesson} isTeacher={isTeacher} session={session} />}
        {route.page === 'grammar' && <GrammarBank goHome={goHome} />}
        {route.page === 'vocabulary' && <VocabularyBank goHome={goHome} setRoute={setRoute} canSeeVocabWord={canSeeVocabWord} isTeacher={isTeacher} session={session} />}
        {route.page === 'vocab-course' && <VocabCoursePage courseId={route.courseId} goHome={goHome} setRoute={setRoute} canSeeVocabWord={canSeeVocabWord} isTeacher={isTeacher} />}
        {route.page === 'vocab-lesson' && <VocabLessonPage courseId={route.courseId} lessonId={route.lessonId} goHome={goHome} setRoute={setRoute} canSeeVocabWord={canSeeVocabWord} isTeacher={isTeacher} />}
        {route.page === 'flashcards' && <FlashcardsPage session={session} mode={route.mode} courseId={route.courseId} lessonId={route.lessonId} canSeeVocabWord={canSeeVocabWord} goHome={goHome} setRoute={setRoute} />}
        {route.page === 'students' && <StudentsPage session={session} goHome={goHome} setRoute={setRoute} />}
        {route.page === 'homework-review' && <HomeworkReviewPage session={session} goHome={goHome} setRoute={setRoute} />}
        {route.page === 'student' && <StudentPage studentId={route.studentId} session={session} goHome={goHome} setRoute={setRoute} />}
        <Footer />
        <ScrollToTop />
      </div>
    </div>
  );
}

function Sidebar({ open, setOpen, activeFilters, toggleFilter, clearFilters, hasFilters, showTypeFilter = true }) {
  const allGroups = [
    { key: 'level', label: 'English Level', items: LEVELS },
    { key: 'age', label: 'Age Group', items: AGE_GROUPS },
    { key: 'type', label: 'Lesson Type', items: TYPES },
  ];
  const groups = showTypeFilter ? allGroups : allGroups.filter(g => g.key !== 'type');
  return (
    <aside className={`sidebar ${open ? '' : 'closed'}`}>
      <div className="sidebar-header">
        <button className="sidebar-toggle" onClick={() => setOpen(!open)}>
          {open ? <PanelLeftClose size={16} /> : <PanelLeft size={16} />}
          {open && <span>Filters</span>}
        </button>
        {open && hasFilters && <button className="clear-btn" onClick={clearFilters}>Clear</button>}
      </div>
      {open && (
        <div className="sidebar-body">
          {groups.map(g => (
            <div key={g.key}>
              <div className="filter-title">{g.label}</div>
              <div className="filter-list">
                {g.items.map(item => {
                  const checked = activeFilters[g.key].includes(item);
                  return (
                    <label key={item} className={`check ${checked ? 'checked' : ''}`}>

function ResultHeader({ count, query, hasFilters, lessonMode }) {
  let title;
  if (query) title = <React.Fragment>Результати для <em>"{query}"</em></React.Fragment>;
  else if (lessonMode && hasFilters) title = 'Відфільтровані уроки';
  else if (lessonMode) title = 'Усі уроки';
  else if (hasFilters) title = 'Відфільтровані курси';
  else title = 'Усі курси';
  const noun = lessonMode ? 'lesson' : 'course';
  return (
    <div className="result-header">
      <div>
        <h2 className="result-title">{title}</h2>
        <p className="result-count">{count} {noun}{count !== 1 ? 's' : ''} found</p>
      </div>
    </div>
  );

function LessonGrid({ lessons, favorites, toggleFavorite, goLesson }) {
  if (!lessons.length) return <div className="empty"><div className="empty-mark">∅</div><p>Жодного уроку не знайдено.</p></div>;
  return <div className="grid">{lessons.map((l, i) => <LessonCard key={l.id} lesson={l} favorited={favorites.has(l.id)} toggleFavorite={toggleFavorite} delay={i * 30} goLesson={goLesson} />)}</div>;
}

function LessonCard({ lesson, favorited, toggleFavorite, delay = 0, goLesson }) {
  return (
    <article className={`card accent-${lesson.accent}`} style={{ animationDelay: `${delay}ms` }} onClick={() => goLesson(lesson.courseId, lesson.id)}>
      <div className="card-top">
        <div className="card-meta">
          <span className="badge level">{lesson.level}</span>
          <span className="badge age">{lesson.age}</span>

      <h3 className="card-title">{lesson.title}{lesson.titleUk && <div style={{ fontSize: 13, color: 'var(--ink-3)', fontStyle: 'italic', marginTop: 2, fontWeight: 400 }}>{lesson.titleUk}</div>}</h3>
      <div className="card-tags">{lesson.tags.map(t => <span key={t} className="tag">#{t}</span>)}</div>

function CourseGrid({ courses, goCourse }) {
  if (!courses.length) {
    return (
      <div className="empty">
        <div className="empty-mark">∅</div>
        <p>Жодного курсу не знайдено.</p>

function CourseCard({ course, goCourse, delay = 0 }) {

    <article className={`course-card accent-${course.accent || 'sage'}`} style={{ animationDelay: `${delay}ms` }} onClick={() => goCourse(course.id)}>

        <div className="course-card-icon"><MapIcon size={24} /></div>
        <div className="course-card-badges">
          <span className="badge level">{course.level}</span>
          <span className="badge age">{course.age}</span>
        </div>
      </div>
      <h3 className="course-card-title">{course.title}</h3>
      {course.subtitle && <div className="course-card-subtitle">{course.subtitle}</div>}
      {course.description && <p className="course-card-desc">{course.description}</p>}
      <div className="course-card-stats">
        <span><strong>{course.units.length}</strong>{course.units.length === 1 ? 'unit' : 'units'}</span>
        <span className="course-card-stat-divider" />

function CoursesStrip({ goCourse }) {
  return (
    <section className="strip">
      <div className="strip-head"><div><h2 className="strip-title"><MapIcon size={18} /> Courses</h2><p className="strip-sub">Структуровані курси, що ведуть учня крок за кроком.</p></div></div>
      <div className="quick-grid">
        {COURSES.map(c => {
          const totalLessons = c.units.reduce((sum, u) => sum + u.lessons.length, 0);
          return (
            <button key={c.id} className={`quick-card accent-${c.accent || 'sage'}`} onClick={() => goCourse(c.id)}>
              <div className="quick-icon"><MapIcon size={22} /></div>
              <div className="quick-body"><div className="quick-label">{c.title}</div><div className="quick-desc">{c.units.length} unit · {totalLessons} lesson</div></div>
              <ArrowRight size={16} />
            </button>
          );
        })}
      </div>
    </section>
